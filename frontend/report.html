<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClaimIQ — Clinical Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090f;--s1:#111118;--s2:#18181f;--b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.10);--t1:#e8e8f0;--t2:#8888a8;--t3:#44445a;--blue:#6b8fff;--purple:#a67fff;--green:#34d97b;--red:#ff6b6b;--mono:'DM Mono',monospace;--sans:'DM Sans',system-ui,sans-serif}
html{font-size:14px}body{background:var(--bg);color:var(--t1);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}
nav{height:54px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(9,9,15,0.95);backdrop-filter:blur(12px)}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none}.mark{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;color:#fff}.bname{font-family:var(--mono);font-size:.75rem;color:var(--t1)}
.nav-right{display:flex;gap:8px}
.btn-print{padding:7px 16px;border-radius:6px;border:1px solid rgba(107,143,255,0.25);background:rgba(107,143,255,0.07);color:var(--blue);font-family:var(--mono);font-size:.62rem;cursor:pointer;transition:all .2s;display:none}
.btn-print:hover{background:rgba(107,143,255,0.14)}.btn-print.show{display:flex;align-items:center;gap:6px}
.btn-close{padding:7px 14px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t3);font-family:var(--mono);font-size:.62rem;cursor:pointer;transition:all .2s}.btn-close:hover{color:var(--t2)}
@media print{nav{display:none}.btn-print{display:none}}

.loading-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 54px);padding:40px}
.loading-card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:32px;width:100%;max-width:420px;text-align:center}
.spin{width:28px;height:28px;border:2px solid var(--b1);border-top-color:var(--blue);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
.load-title{font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--t2);margin-bottom:4px}
.load-sub{font-size:.72rem;color:var(--t3);margin-bottom:20px}
.load-steps{display:flex;flex-direction:column;gap:7px;text-align:left}
.ls{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--t3)}
.ls-dot{width:6px;height:6px;border-radius:50%;background:var(--b2);flex-shrink:0;transition:all .3s}
.ls-dot.active{background:var(--blue)}.ls-dot.done{background:var(--green)}
.ls.active{color:var(--t2)}.ls.done{color:var(--green)}
.prog{height:2px;background:var(--b1);border-radius:1px;overflow:hidden;margin-top:16px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:1px;transition:width .5s ease;width:0}
.provider-badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;border:1px solid rgba(166,127,255,0.2);background:rgba(166,127,255,0.07);font-family:var(--mono);font-size:.58rem;color:var(--purple);margin-bottom:14px}

.error-card{background:var(--s1);border:1px solid rgba(255,107,107,0.2);border-radius:12px;padding:32px;max-width:420px;text-align:center}
.error-icon{font-size:1.8rem;margin-bottom:10px;opacity:.5}
.error-title{font-size:.88rem;font-weight:500;color:var(--red);margin-bottom:8px}
.error-sub{font-size:.75rem;color:var(--t2);line-height:1.6;margin-bottom:18px}
.btn-retry{padding:9px 20px;border-radius:7px;border:none;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;font-family:var(--sans);font-size:.78rem;cursor:pointer}

.report-wrap{min-height:calc(100vh - 54px)}
iframe.rif{width:100%;border:none;display:block}
</style>
</head>
<body>
<nav>
  <a class="brand" href="index.html"><div class="mark">Rx</div><div class="bname">ClaimIQ</div></a>
  <div class="nav-right">
    <button class="btn-print" id="printBtn" onclick="doPrint()">🖨 Print / PDF</button>
    <button class="btn-close" onclick="window.close()">✕ Close</button>
  </div>
</nav>

<div id="main">
  <div class="loading-wrap" id="loadWrap">
    <div class="loading-card">
      <div class="spin"></div>
      <div class="load-title">Generating Report</div>
      <div class="load-sub">AI is writing your clinical document...</div>
      <div class="provider-badge" id="provBadge">🤖 AI Writer</div>
      <div class="load-steps">
        <div class="ls" id="s0"><div class="ls-dot" id="d0"></div>Reading adjudication result</div>
        <div class="ls" id="s1"><div class="ls-dot" id="d1"></div>Analysing reasoning chain</div>
        <div class="ls" id="s2"><div class="ls-dot" id="d2"></div>Writing executive summary</div>
        <div class="ls" id="s3"><div class="ls-dot" id="d3"></div>Drafting clinical narrative</div>
        <div class="ls" id="s4"><div class="ls-dot" id="d4"></div>Compiling recommendations</div>
        <div class="ls" id="s5"><div class="ls-dot" id="d5"></div>Building final document</div>
      </div>
      <div class="prog"><div class="prog-fill" id="pf"></div></div>
    </div>
  </div>
</div>

<script>
const API=sessionStorage.getItem('claimiq_api')||(location.hostname==='localhost'||location.hostname==='127.0.0.1'?'http://localhost:8000':'https://healthcare-claims-agent-production-a15d.up.railway.app');
const TIMES=[400,750,1100,1500,1900,2300];let timers=[];

function startAnim(){
  TIMES.forEach((t,i)=>{
    timers.push(setTimeout(()=>{
      if(i>0){['s','d'].forEach(p=>{const el=document.getElementById(p+(i-1));if(el){el.className=(p==='s'?'ls done':'ls-dot done');}});}
      ['s','d'].forEach(p=>{const el=document.getElementById(p+i);if(el){el.className=(p==='s'?'ls active':'ls-dot active');}});
      document.getElementById('pf').style.width=((i+1)/6*85)+'%';
    },t));
  });
}
function doneAnim(){
  timers.forEach(t=>clearTimeout(t));
  for(let i=0;i<6;i++){['s','d'].forEach(p=>{const el=document.getElementById(p+i);if(el)el.className=(p==='s'?'ls done':'ls-dot done');});}
  document.getElementById('pf').style.width='100%';
}
function showError(msg){
  document.getElementById('main').innerHTML=`<div class="loading-wrap"><div class="error-card"><div class="error-icon">⚠</div><div class="error-title">Report Generation Failed</div><div class="error-sub">${msg}</div><button class="btn-retry" onclick="location.reload()">Try Again</button></div></div>`;
}
function showReport(html){
  doneAnim();
  const main=document.getElementById('main');
  main.innerHTML='<div class="report-wrap"><iframe class="rif" id="rif" scrolling="auto"></iframe></div>';
  const iframe=document.getElementById('rif');
  iframe.onload=()=>{
    try{const h=iframe.contentDocument.body.scrollHeight;iframe.style.height=Math.max(h,window.innerHeight-54)+'px';}catch(e){iframe.style.height='90vh';}
    document.getElementById('printBtn').classList.add('show');
  };
  const blob=new Blob([html],{type:'text/html'});
  iframe.src=URL.createObjectURL(blob);
}
function doPrint(){const iframe=document.getElementById('rif');if(iframe)iframe.contentWindow.print();}

async function run(){
  const raw=sessionStorage.getItem('claimiq_report');
  if(!raw){showError('No report data found. Go to Dashboard → select a claim → Generate Full Clinical Report.');return;}
  let data;
  try{data=JSON.parse(raw);}catch(e){showError('Could not parse report data.');return;}
  try{const h=await fetch(`${API}/health`).then(r=>r.json());const p=h.llm_provider||'rules';const b=document.getElementById('provBadge');b.textContent=p==='groq'?'🦙 Groq LLaMA':p==='gemini'?'✨ Gemini':p==='anthropic'?'🤖 Claude':'⚙ Rule-based';}catch(e){}
  startAnim();
  try{
    const [res]=await Promise.all([fetch(`${API}/report?format=html`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}),new Promise(r=>setTimeout(r,2800))]);
    if(!res.ok){const e=await res.json().catch(()=>({detail:res.statusText}));throw new Error(e.detail||`Error ${res.status}`);}
    const html=await res.text();
    showReport(html);
  }catch(e){showError(`${e.message}<br><br>Make sure the API is running at <code style="font-family:var(--mono);font-size:.75rem">${API}</code>`);}
}
run();
</script>
</body>
</html>
