<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MedFlow AI — Clinical Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAFBFD;--s1:#FFFFFF;--s2:#F8F9FB;--s3:#F0EEEA;--s4:#E8E6E1;
  --b1:rgba(0,0,0,0.05);--b2:rgba(0,0,0,0.07);--b3:rgba(0,0,0,0.12);
  --t1:#1A1A1A;--t2:#5A5A5A;--t3:#8A8A8A;--t4:#B0B0B0;
  --blue:#2563EB;--purple:#7c3aed;--teal:#0B6E5F;
  --green:#059669;--red:#dc2626;--amber:#b45309;
  --serif:'Instrument Serif',serif;
  --mono:'IBM Plex Mono',monospace;--sans:'DM Sans',sans-serif;
}
html{font-size:14px}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);-webkit-font-smoothing:antialiased;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
@media print{.mf-nav{display:none}}

/* ── LOADING ── */
.loading-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:40px}
.loading-card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:36px;width:100%;max-width:440px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.04)}
.spin{width:30px;height:30px;border:2px solid var(--b1);border-top-color:var(--teal);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.load-title{font-family:var(--serif);font-size:1.1rem;font-style:italic;font-weight:400;color:var(--t1);margin-bottom:4px}
.load-sub{font-size:.75rem;color:var(--t3);margin-bottom:20px}
.load-steps{display:flex;flex-direction:column;gap:8px;text-align:left}
.ls{display:flex;align-items:center;gap:9px;font-size:.73rem;color:var(--t3);transition:color .3s}
.ls-dot{width:7px;height:7px;border-radius:50%;background:var(--b2);flex-shrink:0;transition:all .3s}
.ls-dot.active{background:var(--teal);box-shadow:0 0 8px rgba(11,110,95,0.4)}
.ls-dot.done{background:var(--green)}
.ls.active{color:var(--t2)}.ls.done{color:var(--green)}
.prog{height:2px;background:var(--b1);border-radius:1px;overflow:hidden;margin-top:18px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:1px;transition:width .5s ease;width:0}
.provider-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;border:1px solid rgba(11,110,95,0.15);background:rgba(11,110,95,0.07);font-family:var(--mono);font-size:.6rem;color:var(--teal);margin-bottom:16px}

/* ── ERROR ── */
.error-card{background:var(--s1);border:1px solid rgba(220,38,38,0.15);border-radius:14px;padding:36px;max-width:440px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.04)}
.error-icon{font-size:2rem;margin-bottom:12px;opacity:.4}
.error-title{font-family:var(--serif);font-size:1.1rem;font-style:italic;color:var(--red);margin-bottom:8px}
.error-sub{font-size:.75rem;color:var(--t2);line-height:1.65;margin-bottom:20px}
.btn-retry{padding:10px 22px;border-radius:8px;border:none;background:var(--teal);color:#fff;font-family:var(--sans);font-size:.8rem;font-weight:500;cursor:pointer;transition:opacity .2s}
.btn-retry:hover{opacity:.85}

/* ── REPORT FRAME ── */
.report-wrap{min-height:calc(100vh - 64px)}
iframe.rif{width:100%;border:none;display:block}
</style>
</head>
<body>
<nav class="mf-nav" style="height:64px;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;background:rgba(250,251,253,0.9);backdrop-filter:blur(16px)">
  <a style="display:flex;align-items:center;gap:10px;text-decoration:none" href="index.html">
    <span style="width:30px;height:30px;border-radius:8px;background:#0B6E5F;display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span>
    <span style="font-weight:700;font-size:.9rem;color:#1A1A1A">MedFlow AI</span>
  </a>
  <div style="display:flex;gap:2px">
    <a href="index.html" style="padding:6px 14px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:500;color:#8A8A8A">Overview</a>
    <a href="submit.html" style="padding:6px 14px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:500;color:#8A8A8A">Submit</a>
    <a href="dashboard.html" style="padding:6px 14px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:500;color:#1A1A1A;background:rgba(11,110,95,0.05)">Dashboard</a>
    <a href="imaging.html" style="padding:6px 14px;border-radius:8px;text-decoration:none;font-size:.8rem;font-weight:500;color:#8A8A8A">Imaging</a>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button id="printBtn" onclick="doPrint()" style="display:none;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;border:1px solid rgba(11,110,95,0.2);background:rgba(11,110,95,0.07);color:#0B6E5F;font-family:'IBM Plex Mono',monospace;font-size:.62rem;cursor:pointer;transition:all .2s">🖨 Print</button>
    <div style="display:flex;align-items:center;gap:6px"><div id="dot" style="width:6px;height:6px;border-radius:50%;background:#059669"></div><span id="apiTxt" style="font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:#8A8A8A">Connecting...</span></div>
    <a href="dashboard.html" style="padding:8px 18px;border-radius:8px;background:#0B6E5F;color:#fff;font-size:.78rem;font-weight:600;text-decoration:none">← Dashboard</a>
  </div>
</nav>

<div id="main">
  <div class="loading-wrap" id="loadWrap">
    <div class="loading-card">
      <div class="spin"></div>
      <div class="load-title">Generating Report</div>
      <div class="load-sub">AI is writing your clinical document...</div>
      <div class="provider-badge" id="provBadge">🤖 AI Writer</div>
      <div class="load-steps">
        <div class="ls" id="s0"><div class="ls-dot" id="d0"></div>Reading adjudication result</div>
        <div class="ls" id="s1"><div class="ls-dot" id="d1"></div>Analysing reasoning chain</div>
        <div class="ls" id="s2"><div class="ls-dot" id="d2"></div>Writing executive summary</div>
        <div class="ls" id="s3"><div class="ls-dot" id="d3"></div>Drafting clinical narrative</div>
        <div class="ls" id="s4"><div class="ls-dot" id="d4"></div>Compiling recommendations</div>
        <div class="ls" id="s5"><div class="ls-dot" id="d5"></div>Building final document</div>
      </div>
      <div class="prog"><div class="prog-fill" id="pf"></div></div>
    </div>
  </div>
</div>

<script>
const API=sessionStorage.getItem('medflow_api')||(location.hostname==='localhost'||location.hostname==='127.0.0.1'?'http://localhost:8000':'https://healthcare-claims-agent-production-a15d.up.railway.app');
const TIMES=[400,750,1100,1500,1900,2300];let timers=[];

function startAnim(){
  TIMES.forEach((t,i)=>{
    timers.push(setTimeout(()=>{
      if(i>0){['s','d'].forEach(p=>{const el=document.getElementById(p+(i-1));if(el){el.className=(p==='s'?'ls done':'ls-dot done');}});}
      ['s','d'].forEach(p=>{const el=document.getElementById(p+i);if(el){el.className=(p==='s'?'ls active':'ls-dot active');}});
      document.getElementById('pf').style.width=((i+1)/6*85)+'%';
    },t));
  });
}
function doneAnim(){
  timers.forEach(t=>clearTimeout(t));
  for(let i=0;i<6;i++){['s','d'].forEach(p=>{const el=document.getElementById(p+i);if(el)el.className=(p==='s'?'ls done':'ls-dot done');});}
  document.getElementById('pf').style.width='100%';
}
function showError(msg){
  document.getElementById('main').innerHTML=`<div class="loading-wrap"><div class="error-card"><div class="error-icon">⚠</div><div class="error-title">Report Generation Failed</div><div class="error-sub">${msg}</div><button class="btn-retry" onclick="location.reload()">Try Again</button></div></div>`;
}
function showReport(html){
  doneAnim();
  const main=document.getElementById('main');
  main.innerHTML='<div class="report-wrap"><iframe class="rif" id="rif" scrolling="auto"></iframe></div>';
  const iframe=document.getElementById('rif');
  iframe.onload=()=>{
    try{const h=iframe.contentDocument.body.scrollHeight;iframe.style.height=Math.max(h,window.innerHeight-54)+'px';}catch(e){iframe.style.height='90vh';}
    const pb=document.getElementById('printBtn');if(pb)pb.style.display='flex';
  };
  const blob=new Blob([html],{type:'text/html'});
  iframe.src=URL.createObjectURL(blob);
}
function doPrint(){const iframe=document.getElementById('rif');if(iframe)iframe.contentWindow.print();}

async function run(){
  const raw=sessionStorage.getItem('medflow_report');
  if(!raw){showError('No report data found. Go to Dashboard → select a claim → Generate Full Clinical Report.');return;}
  let data;
  try{data=JSON.parse(raw);}catch(e){showError('Could not parse report data.');return;}
  try{const h=await fetch(`${API}/health`).then(r=>r.json());const p=h.llm_provider||'rules';const b=document.getElementById('provBadge');b.textContent=p==='groq'?'🦙 Groq LLaMA':p==='gemini'?'✨ Gemini':p==='anthropic'?'🤖 Claude':'⚙ Rule-based';}catch(e){}
  startAnim();
  try{
    const [res]=await Promise.all([fetch(`${API}/report?format=html`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}),new Promise(r=>setTimeout(r,2800))]);
    if(!res.ok){const e=await res.json().catch(()=>({detail:res.statusText}));throw new Error(e.detail||`Error ${res.status}`);}
    const html=await res.text();
    showReport(html);
  }catch(e){showError(`${e.message}<br><br>Make sure the API is running at <code style="font-family:var(--mono);font-size:.75rem">${API}</code>`);}
}
run();
</script>
</body>
</html>
