<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ClaimIQ — Clinical Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#f6f4ee;--white:#fff;--paper:#faf9f6;--stone:#eae8e0;--ash:#d8d6cc;--ink:#18181a;--ink2:#4a4845;--ink3:#8a8780;--blue:#1e40af;--blue-l:#dbeafe;--blue-b:#93c5fd;--serif:'Fraunces',Georgia,serif;--mono:'DM Mono','Courier New',monospace;--sans:'DM Sans',system-ui,sans-serif;}
html{font-size:14px}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse 900px 600px at 15% 20%,rgba(30,64,175,0.04) 0%,transparent 70%),radial-gradient(ellipse 700px 500px at 85% 75%,rgba(91,33,182,0.04) 0%,transparent 70%);pointer-events:none}
body::after{content:'';position:fixed;inset:0;z-index:-1;background-image:radial-gradient(circle,rgba(24,24,26,0.055) 1px,transparent 1px);background-size:28px 28px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);pointer-events:none}
@media print{body{background:#fff}body::before,body::after{display:none}.no-print{display:none!important}.report-iframe{height:auto;border:none;box-shadow:none}}

nav{position:sticky;top:0;z-index:100;height:60px;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--stone);display:flex;align-items:center;justify-content:space-between;padding:0 32px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#1e40af,#5b21b6);display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--mono);font-size:10px;font-weight:500}
.nav-name{font-family:var(--serif);font-size:1rem;color:var(--ink)}
.nav-sub{font-family:var(--mono);font-size:.55rem;color:var(--ink3);margin-top:-1px}
.nav-right{display:flex;gap:8px}
.btn-p{padding:8px 18px;border-radius:8px;border:1.5px solid var(--blue);background:var(--blue-l);color:var(--blue);font-family:var(--sans);font-size:.78rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
.btn-p:hover{background:var(--blue);color:#fff}
.btn-o{padding:8px 14px;border-radius:8px;border:1px solid var(--stone);background:var(--white);color:var(--ink2);font-family:var(--sans);font-size:.78rem;cursor:pointer;transition:all .2s}
.btn-o:hover{border-color:var(--ash)}

/* LOADING */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 60px);gap:20px;padding:40px}
.loading-card{background:var(--white);border:1px solid var(--stone);border-radius:16px;padding:40px;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center}
.spin{width:36px;height:36px;border:2px solid var(--stone);border-top-color:var(--blue);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 16px}
@keyframes sp{to{transform:rotate(360deg)}}
.load-title{font-family:var(--serif);font-size:1.2rem;margin-bottom:6px}
.load-sub{font-family:var(--mono);font-size:.65rem;color:var(--ink3);margin-bottom:24px}
.progress-steps{display:flex;flex-direction:column;gap:8px;text-align:left}
.pstep{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--paper);border:1px solid var(--stone);font-size:.75rem;color:var(--ink2);transition:all .4s}
.pstep.active{background:var(--blue-l);border-color:var(--blue-b);color:var(--blue)}
.pstep.done{background:#d1fae5;border-color:#6ee7b7;color:#065f46}
.pstep-dot{width:8px;height:8px;border-radius:50%;background:var(--ash);flex-shrink:0;transition:all .3s}
.pstep.active .pstep-dot{background:var(--blue);box-shadow:0 0 0 3px rgba(30,64,175,.15)}
.pstep.done .pstep-dot{background:#065f46}
.progress-bar{height:3px;background:var(--stone);border-radius:2px;margin-top:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#1e40af,#5b21b6);border-radius:2px;transition:width .6s ease;width:0}
.provider-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-family:var(--mono);font-size:.6rem;border:1px solid var(--blue-b);background:var(--blue-l);color:var(--blue);margin-bottom:16px}

/* ERROR */
.error-card{background:var(--white);border:1px solid #fca5a5;border-radius:16px;padding:40px;max-width:480px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.error-icon{font-size:2rem;margin-bottom:12px}
.error-title{font-family:var(--serif);font-size:1.2rem;color:#991b1b;margin-bottom:8px}
.error-sub{font-size:.8rem;color:var(--ink2);line-height:1.6;margin-bottom:20px}
.btn-retry{padding:9px 20px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-family:var(--sans);font-size:.8rem;font-weight:600;cursor:pointer}

/* REPORT FRAME */
.report-frame-wrap{padding:0;min-height:calc(100vh - 60px)}
iframe.report-iframe{width:100%;border:none;display:block;min-height:calc(100vh - 60px)}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">
    <div class="nav-logo">Rx</div>
    <div><div class="nav-name">ClaimIQ</div><div class="nav-sub">Clinical Adjudication Report</div></div>
  </a>
  <div class="nav-right">
    <button class="btn-p" id="printBtn" onclick="printReport()" style="display:none">🖨 Print / Save PDF</button>
    <button class="btn-o" onclick="window.close()">✕ Close</button>
  </div>
</nav>

<div id="main">
  <!-- Loading state shown initially -->
  <div class="loading-wrap" id="loadingWrap">
    <div class="loading-card">
      <div class="spin"></div>
      <div class="load-title">Generating Clinical Report</div>
      <div class="load-sub">The AI is writing your full narrative report...</div>
      <div class="provider-badge" id="providerBadge">🤖 AI Writer</div>
      <div class="progress-steps">
        <div class="pstep" id="ps0"><div class="pstep-dot"></div>Reading adjudication result</div>
        <div class="pstep" id="ps1"><div class="pstep-dot"></div>Analysing reasoning chain</div>
        <div class="pstep" id="ps2"><div class="pstep-dot"></div>Generating executive summary</div>
        <div class="pstep" id="ps3"><div class="pstep-dot"></div>Writing clinical findings narrative</div>
        <div class="pstep" id="ps4"><div class="pstep-dot"></div>Drafting recommendations</div>
        <div class="pstep" id="ps5"><div class="pstep-dot"></div>Building final document</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    </div>
  </div>
</div>

<script>
const API = sessionStorage.getItem('claimiq_api') || 'http://localhost:8000';

// ── Animate loading steps ──────────────────────────────────────────
const STEP_TIMES = [400, 800, 1200, 1600, 2000, 2400];
let stepTimers = [];

function startLoadAnimation() {
  STEP_TIMES.forEach((t, i) => {
    stepTimers.push(setTimeout(() => {
      if (i > 0) {
        document.getElementById(`ps${i-1}`).classList.remove('active');
        document.getElementById(`ps${i-1}`).classList.add('done');
      }
      document.getElementById(`ps${i}`).classList.add('active');
      document.getElementById('progFill').style.width = ((i+1)/6*85) + '%';
    }, t));
  });
}

function completeLoad() {
  stepTimers.forEach(t => clearTimeout(t));
  for (let i = 0; i < 6; i++) {
    const el = document.getElementById(`ps${i}`);
    el.classList.remove('active');
    el.classList.add('done');
  }
  document.getElementById('progFill').style.width = '100%';
}

// ── Show report in iframe ──────────────────────────────────────────
function showReport(html) {
  completeLoad();

  const main = document.getElementById('main');
  main.innerHTML = '<div class="report-frame-wrap"><iframe class="report-iframe" id="rif" scrolling="auto"></iframe></div>';

  const iframe = document.getElementById('rif');

  // Write HTML into iframe
  iframe.onload = () => {
    // Auto-resize iframe to content height
    try {
      const h = iframe.contentDocument.body.scrollHeight;
      iframe.style.height = Math.max(h, window.innerHeight - 60) + 'px';
    } catch(e) {
      iframe.style.height = '90vh';
    }
    document.getElementById('printBtn').style.display = 'flex';
  };

  const blob = new Blob([html], {type: 'text/html'});
  iframe.src = URL.createObjectURL(blob);
}

// ── Show error ─────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div class="loading-wrap">
      <div class="error-card">
        <div class="error-icon">⚠️</div>
        <div class="error-title">Report Generation Failed</div>
        <div class="error-sub">${msg}</div>
        <button class="btn-retry" onclick="location.reload()">Try Again</button>
      </div>
    </div>`;
}

// ── Print ──────────────────────────────────────────────────────────
function printReport() {
  const iframe = document.getElementById('rif');
  if (iframe) {
    iframe.contentWindow.print();
  }
}

// ── Main ───────────────────────────────────────────────────────────
async function run() {
  const raw = sessionStorage.getItem('claimiq_report');
  if (!raw) {
    showError('No report data found. Go back to the dashboard, submit a claim, and click "Generate Full Clinical Report".');
    return;
  }

  let data;
  try {
    data = JSON.parse(raw);
  } catch(e) {
    showError('Could not parse report data: ' + e.message);
    return;
  }

  // Update provider badge
  try {
    const health = await fetch(`${API}/health`).then(r => r.json());
    const provider = health.llm_provider || 'rules';
    const badge = document.getElementById('providerBadge');
    if (provider === 'groq') {
      badge.textContent = '🦙 Groq LLaMA writing report...';
    } else if (provider === 'gemini') {
      badge.textContent = '✨ Gemini writing report...';
    } else if (provider === 'anthropic') {
      badge.textContent = '🤖 Claude writing report...';
    } else {
      badge.textContent = '⚙️ Rule-based report generation';
    }
  } catch(e) {}

  startLoadAnimation();

  try {
    const minWait = new Promise(r => setTimeout(r, 3000));
    const [res] = await Promise.all([
      fetch(`${API}/report?format=html`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data),
      }),
      minWait,
    ]);

    if (!res.ok) {
      const err = await res.json().catch(() => ({detail: res.statusText}));
      throw new Error(err.detail || `Server error ${res.status}`);
    }

    const html = await res.text();
    showReport(html);

  } catch(e) {
    showError(
      `Could not generate report from API: ${e.message}<br><br>` +
      `Make sure the API is running at <code>${API}</code> and try again.`
    );
  }
}

run();
</script>
</body>
</html>
