<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaimIQ — Submit Claim</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --glass:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --blue:#3b82f6;
  --purple:#8b5cf6;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  background:
    linear-gradient(rgba(11,15,26,0.9), rgba(11,15,26,0.95)),
    url("https://images.unsplash.com/photo-1579684385127-1ef15d508118?q=80&w=1920&auto=format&fit=crop");
  background-size:cover;
  background-position:center;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.4);
  border-bottom:1px solid var(--border);
  z-index:100;
}

.nav-logo{font-weight:600}
.nav-links a{
  color:var(--muted);
  margin-left:20px;
  text-decoration:none;
}

/* LAYOUT */
.container{
  padding-top:120px;
  display:grid;
  grid-template-columns:1fr 350px;
  gap:30px;
  max-width:1200px;
  margin:auto;
  padding-left:20px;
  padding-right:20px;
}

/* CARD */
.card{
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(16px);
  border-radius:16px;
  padding:25px;
  animation:fadeUp .6s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* FORM */
h2{
  font-family:'Fraunces',serif;
  margin-bottom:20px;
}

label{
  font-size:.75rem;
  color:var(--muted);
  display:block;
  margin-bottom:6px;
}

input, textarea, select{
  width:100%;
  padding:10px 12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.03);
  color:var(--text);
  margin-bottom:16px;
  outline:none;
}

input:focus, textarea:focus{
  border-color:var(--blue);
  box-shadow:0 0 0 2px rgba(59,130,246,0.2);
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(59,130,246,0.3);
}

/* SIDEBAR */
.tip{
  font-size:.85rem;
  color:var(--muted);
  margin-bottom:10px;
}

/* LOADING OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:200;
}

.overlay.active{
  display:flex;
}

.loader{
  width:300px;
  padding:30px;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:16px;
  text-align:center;
}

.bar{
  height:6px;
  background:var(--border);
  border-radius:4px;
  overflow:hidden;
  margin-top:20px;
}

.fill{
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--blue),var(--purple));
  animation:load 2s infinite;
}

@keyframes load{
  0%{width:0}
  100%{width:100%}
}

</style>
</head>

<body>

<nav>
  <div class="nav-logo">ClaimIQ</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="imaging.html">Imaging</a>
  </div>
</nav>

<div class="container">

  <!-- FORM -->
  <div class="card">
    <h2>Submit Clinical Claim</h2>

    <label>Patient Name</label>
    <input type="text">

    <label>Age</label>
    <input type="number">

    <label>Diagnosis Notes</label>
    <textarea placeholder="Enter clinical notes..."></textarea>

    <label>Procedure</label>
    <input type="text">

    <button class="btn" onclick="submitClaim()">Run AI Adjudication</button>
  </div>

  <!-- SIDEBAR -->
  <div class="card">
    <h3>Tips</h3>
    <p class="tip">✔ Include detailed symptoms</p>
    <p class="tip">✔ Mention procedures clearly</p>
    <p class="tip">✔ Avoid vague terms</p>
  </div>

</div>

<!-- LOADER -->
<div class="overlay" id="overlay">
  <div class="loader">
    Processing Claim...
    <div class="bar"><div class="fill"></div></div>
  </div>
</div>

<script>
function submitClaim(){
  document.getElementById("overlay").classList.add("active");

  setTimeout(()=>{
    window.location="dashboard.html";
  },2000);
}
</script>

</body>
</html>
