<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaimIQ — Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --glass:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --blue:#3b82f6;
  --purple:#8b5cf6;
  --green:#22c55e;
  --red:#ef4444;
  --amber:#f59e0b;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  background:
    linear-gradient(rgba(11,15,26,0.9), rgba(11,15,26,0.95)),
    url("https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?q=80&w=1920&auto=format&fit=crop");
  background-size:cover;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  backdrop-filter:blur(20px);
  background:rgba(0,0,0,0.4);
  border-bottom:1px solid var(--border);
  z-index:100;
}

/* LAYOUT */
.container{
  padding-top:110px;
  max-width:1200px;
  margin:auto;
  padding-left:20px;
  padding-right:20px;
}

/* CARDS */
.card{
  background:var(--glass);
  border:1px solid var(--border);
  backdrop-filter:blur(16px);
  border-radius:16px;
  padding:20px;
  transition:.3s;
}
.card:hover{
  transform:translateY(-5px);
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.stat-value{
  font-size:1.8rem;
  font-weight:600;
}

.stat-label{
  color:var(--muted);
  font-size:.8rem;
}

/* MAIN GRID */
.grid{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
}

/* CLAIM LIST */
.claim{
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.03);
  cursor:pointer;
  transition:.2s;
}
.claim:hover{
  background:rgba(255,255,255,0.08);
}

.badge{
  padding:3px 8px;
  border-radius:6px;
  font-size:.7rem;
}

.approved{background:rgba(34,197,94,0.2);color:var(--green)}
.rejected{background:rgba(239,68,68,0.2);color:var(--red)}
.review{background:rgba(245,158,11,0.2);color:var(--amber)}

/* DETAILS */
.details h2{
  font-family:'Fraunces',serif;
  margin-bottom:10px;
}

.code{
  background:rgba(255,255,255,0.05);
  padding:8px;
  border-radius:8px;
  margin-bottom:8px;
}

/* ANIMATION */
.fade{
  opacity:0;
  transform:translateY(20px);
  transition:all .7s ease;
}
.fade.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<nav>
  <div>ClaimIQ Dashboard</div>
  <div>
    <a href="index.html" style="color:var(--muted)">Home</a>
    <a href="submit.html" style="color:var(--muted)">Submit</a>
    <a href="imaging.html" style="color:var(--muted)">Imaging</a>
  </div>
</nav>

<div class="container">

  <!-- STATS -->
  <div class="stats fade">
    <div class="card">
      <div class="stat-value" id="s1">0</div>
      <div class="stat-label">Total Claims</div>
    </div>
    <div class="card">
      <div class="stat-value" id="s2">0</div>
      <div class="stat-label">Approved</div>
    </div>
    <div class="card">
      <div class="stat-value" id="s3">0</div>
      <div class="stat-label">Rejected</div>
    </div>
    <div class="card">
      <div class="stat-value" id="s4">0</div>
      <div class="stat-label">Needs Review</div>
    </div>
  </div>

  <!-- GRID -->
  <div class="grid">

    <!-- LEFT: CLAIM LIST -->
    <div class="card fade">
      <h3>Claims</h3>

      <div class="claim">
        Claim #001 <span class="badge approved">Approved</span>
      </div>
      <div class="claim">
        Claim #002 <span class="badge rejected">Rejected</span>
      </div>
      <div class="claim">
        Claim #003 <span class="badge review">Review</span>
      </div>

    </div>

    <!-- RIGHT: DETAILS -->
    <div class="card details fade">
      <h2>Claim Details</h2>

      <p style="color:var(--muted)">Diagnosis:</p>
      <div class="code">Type 2 Diabetes</div>

      <p style="color:var(--muted)">ICD Code:</p>
      <div class="code">E11</div>

      <p style="color:var(--muted)">CPT Code:</p>
      <div class="code">83036</div>

      <p style="color:var(--muted)">AI Decision:</p>
      <div class="code" style="color:var(--green)">Approved</div>

    </div>

  </div>

</div>

<script>
/* SCROLL ANIMATION */
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('show');
    }
  });
});
document.querySelectorAll('.fade').forEach(el=>observer.observe(el));

/* COUNTER ANIMATION */
function animate(id,val){
  let el=document.getElementById(id);
  let start=0;
  let step=()=>{
    start+=val/30;
    el.innerText=Math.floor(start);
    if(start<val) requestAnimationFrame(step);
  }
  step();
}

animate("s1",120);
animate("s2",80);
animate("s3",20);
animate("s4",20);
</script>

</body>
</html>
